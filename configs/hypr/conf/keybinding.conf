# -----------------------------------------------------------------------------
# KEYBINDINGS
# -----------------------------------------------------------------------------

$mainMod = SUPER

# -----------------------------------------------------------------------------
# APPLICATIONS
# -----------------------------------------------------------------------------

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Space, exec, ~/.config/viegphunt/app_launcher.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, code

# -----------------------------------------------------------------------------
# WEB APPS (ALT)
# -----------------------------------------------------------------------------

bind = ALT, W, exec, $browser --new-window https://web.whatsapp.com
bind = ALT, T, exec, $browser --new-window https://web.telegram.org
bind = ALT, C, exec, $browser --new-window https://chatgpt.com
bind = ALT, Y, exec, $browser --new-window https://youtube.com
bind = ALT, M, exec, $browser --new-window https://mail.google.com
bind = ALT, G, exec, $browser --new-window https://github.com

bind = ALT, L, exec, $browser --new-window https://leetcode.com
bind = ALT, S, exec, $browser --new-window https://open.spotify.com
bind = ALT, R, exec, $browser --new-window https://reddit.com
bind = ALT, X, exec, $browser --new-window https://x.com


# -----------------------------------------------------------------------------
# WINDOW MANAGEMENT (VIM STYLE)
# -----------------------------------------------------------------------------

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d        
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

binde = $mainMod CTRL, H, resizeactive, -50 0
binde = $mainMod CTRL, J, resizeactive, 0 50
binde = $mainMod CTRL, K, resizeactive, 0 -50
binde = $mainMod CTRL, L, resizeactive, 50 0

# -----------------------------------------------------------------------------
# WINDOW ACTIONS
# -----------------------------------------------------------------------------

bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill

bind = $mainMod, F, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, TAB, cyclenext

# -----------------------------------------------------------------------------
# SCREENSHOTS
# -----------------------------------------------------------------------------

bind = $mainMod, S, exec, hyprshot -m region -o $HOME/Pictures/Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m output -o $HOME/Pictures/Screenshots

# -----------------------------------------------------------------------------
# PRODUCTIVITY
# -----------------------------------------------------------------------------

bind = $mainMod, V, exec, ~/.config/viegphunt/clipboard_launcher.sh
bind = $mainMod, PERIOD, exec, ~/.config/viegphunt/emoji_launcher.sh

# -----------------------------------------------------------------------------
# WALLPAPERS
# -----------------------------------------------------------------------------

bind = $mainMod, W, exec, ~/.config/viegphunt/wallpaper_select.sh
bind = $mainMod SHIFT, W, exec, ~/.config/viegphunt/wallpaper_random.sh

# -----------------------------------------------------------------------------
# HELP
# -----------------------------------------------------------------------------

bind = $mainMod, SLASH, exec, ~/.config/viegphunt/key_hints.sh

# -----------------------------------------------------------------------------
# SESSION
# -----------------------------------------------------------------------------

bind = ALT SHIFT, L, exec, hyprlock
bind = $mainMod, X, exec, wlogout
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = ALT, F4, exec, systemctl poweroff
# -----------------------------------------------------------------------------
# WORKSPACES
# -----------------------------------------------------------------------------

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# -----------------------------------------------------------------------------
# MULTIMEDIA
# -----------------------------------------------------------------------------

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# -----------------------------------------------------------------------------
# MEDIA CONTROL
# -----------------------------------------------------------------------------

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
